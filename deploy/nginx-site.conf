# Example nginx config for Archipelago Tools
# For Nginx Proxy Manager: create a proxy host pointing to your server IP:5001
#
# IMPORTANT: AP game server ports (38281-38380) use the Archipelago protocol
# (WebSocket-like), NOT HTTP. They need to be TCP-forwarded through your
# router/firewall, not proxied through nginx.
#
# In your router: forward TCP ports 38281-38380 to the server running this app.
# Players connect their AP clients to: yoursite.com:38281 (or whichever port)

# Place this in http {} context (e.g. /etc/nginx/conf.d/rate-limit.conf)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

server {
    listen 80;
    server_name ap.example.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: 1 year, includeSubDomains. Only takes effect over HTTPS -
    # this block listens on :80 but NPM (or another upstream TLS terminator)
    # passes this header through on its HTTPS leg to the client.
    # If you terminate TLS here directly, move this into the listen 443 block.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web UI + API
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File uploads
        client_max_body_size 50M;
    }
}
